name: Reusable - Claude Code

on:
  workflow_call:
    inputs:
      claude-args:
        description: |
          Optional CLI args forwarded to claude-code-action via its
          `claude_args` input. Use for things like
          `--allowedTools "Bash(gh pr view:*),mcp__github_inline_comment__create_inline_comment"`
          or `--model claude-opus-4-7`.
        required: false
        type: string
        default: ''
      prompt:
        description: |
          Optional explicit prompt for claude-code-action. Leave empty to
          let the action auto-detect mode from the triggering event
          (@claude mention, PR review, issue assignment, etc.).
        required: false
        type: string
        default: ''
    secrets:
      claude-code-oauth-token:
        required: true

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read
    steps:
      - uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@de8e0b9c42c6cb58e904c857f164aa072244c1ac # beta
        with:
          claude_code_oauth_token: ${{ secrets.claude-code-oauth-token }}
          additional_permissions: |
            actions: read
          prompt: ${{ inputs.prompt }}
          claude_args: ${{ inputs.claude-args }}
