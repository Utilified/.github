name: Reusable - Claude Code

on:
  workflow_call:
    inputs:
      allowed-tools:
        description: 'Optional comma-separated allowed tools string passed to claude-code-action'
        required: false
        type: string
        default: ''
    secrets:
      claude-code-oauth-token:
        required: true

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.claude-code-oauth-token }}
          additional_permissions: |
            actions: read
          allowed_tools: ${{ inputs.allowed-tools }}
