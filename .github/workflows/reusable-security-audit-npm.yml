name: Reusable - Security Audit (npm)

# Blocking dependency-vulnerability gate for npm projects.
# Combines:
#   - npm audit (production deps, high+ severity)
#   - npm audit signatures (verifies registry signatures - catches some
#     supply-chain compromises that bypass CVE feeds)
#   - GitHub dependency-review-action (PR-only: license + advisory diff)
#   - step-security/harden-runner (network egress audit/block, catches
#     unexpected outbound from compromised packages)
#
# Install uses --ignore-scripts so a malicious postinstall cannot execute
# during CI even if a compromised version slips through.

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version"
        required: false
        type: string
        default: "24"
      audit-level:
        description: "Minimum severity to fail on (low|moderate|high|critical)"
        required: false
        type: string
        default: "high"
      working-directory:
        description: "Directory containing package.json"
        required: false
        type: string
        default: "."

permissions:
  contents: read
  pull-requests: read

jobs:
  npm-audit:
    name: npm audit (gate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ inputs.node-version }}
          cache: "npm"
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

      - name: Install dependencies (no lifecycle scripts)
        run: npm ci --ignore-scripts

      - name: npm audit (production deps)
        env:
          AUDIT_LEVEL: ${{ inputs.audit-level }}
        run: npm audit --omit=dev --audit-level="$AUDIT_LEVEL"

      - name: npm audit signatures
        # Verifies that every installed package has a valid signature from
        # the npm registry. Catches some supply-chain compromises before
        # they appear in CVE databases.
        run: npm audit signatures

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/dependency-review-action@67d4f4bd7a9b17a0db54d2a7519187c65e339de8 # v4.5.0
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0
