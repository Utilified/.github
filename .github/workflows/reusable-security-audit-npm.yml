name: Reusable - Security Audit (npm)

# Blocking dependency-vulnerability gate for npm projects.
# Combines:
#   - npm audit (production deps, high+ severity) with optional GHSA allowlist
#     for advisories bundled inside framework deps that can't be patched
#     via npm overrides (e.g. fast-uri inside aws-cdk-lib)
#   - npm audit signatures (verifies registry signatures - catches some
#     supply-chain compromises that bypass CVE feeds)
#   - GitHub dependency-review-action (PR-only, OPT-IN via input -
#     requires GitHub Advanced Security on private repos)
#   - step-security/harden-runner (network egress audit/block, catches
#     unexpected outbound from compromised packages)
#
# Install uses --ignore-scripts so a malicious postinstall cannot execute
# during CI even if a compromised version slips through.

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version"
        required: false
        type: string
        default: "24"
      audit-level:
        description: "Minimum severity to fail on (low|moderate|high|critical)"
        required: false
        type: string
        default: "high"
      working-directory:
        description: "Directory containing package.json"
        required: false
        type: string
        default: "."
      enable-dependency-review:
        description: "Enable GitHub dependency-review-action (requires GHAS on private repos)"
        required: false
        type: boolean
        default: false
      allow-advisories:
        description: "Whitespace-separated GHSA ids to allowlist (for advisories inside framework deps that can't be patched via npm overrides). Empty means no allowlist."
        required: false
        type: string
        default: ""

permissions:
  contents: read
  pull-requests: read

jobs:
  npm-audit:
    name: npm audit (gate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ inputs.node-version }}
          cache: "npm"
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

      - name: Install dependencies (no lifecycle scripts)
        run: npm ci --ignore-scripts

      - name: npm audit (production deps)
        env:
          AUDIT_LEVEL: ${{ inputs.audit-level }}
          ALLOW_ADVISORIES: ${{ inputs.allow-advisories }}
        run: |
          set -euo pipefail
          if [ -z "${ALLOW_ADVISORIES// /}" ]; then
            npm audit --omit=dev --audit-level="$AUDIT_LEVEL"
            exit 0
          fi

          # Allowlist mode: parse audit JSON, compare advisories at or above
          # AUDIT_LEVEL against the allowlist. Pass only if every finding is
          # explicitly allowlisted; warn if an allowlisted advisory is no
          # longer present (drift signal).
          ALLOWED=$(printf '%s\n' $ALLOW_ADVISORIES | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$' | sort -u)

          AUDIT_JSON=$(npm audit --omit=dev --json 2>/dev/null || true)
          FOUND=$(printf '%s' "$AUDIT_JSON" | jq -r --arg lvl "$AUDIT_LEVEL" '
              # Severity ordering: low < moderate < high < critical
              ($lvl | ascii_downcase) as $threshold
              | { low:0, moderate:1, high:2, critical:3 } as $rank
              | .vulnerabilities
              | to_entries
              | map(.value.via[]?)
              | map(select(type == "object" and ($rank[.severity // ""] // -1) >= ($rank[$threshold] // 2)))
              | map((.url // "") | capture("(?<id>GHSA-[a-z0-9-]+)"; "i").id // empty)
              | unique
              | .[]
            ' | sort -u)

          UNEXPECTED=$(comm -23 <(printf '%s\n' "$FOUND") <(printf '%s\n' "$ALLOWED"))
          if [ -n "$UNEXPECTED" ]; then
            echo "::error::Unexpected $AUDIT_LEVEL+ advisories not in allowlist:"
            echo "$UNEXPECTED"
            echo "---"
            npm audit --omit=dev --audit-level="$AUDIT_LEVEL" || true
            exit 1
          fi

          STALE=$(comm -13 <(printf '%s\n' "$FOUND") <(printf '%s\n' "$ALLOWED"))
          if [ -n "$STALE" ]; then
            echo "::warning::Allowlisted advisories no longer present - remove from caller workflow:"
            echo "$STALE"
          fi
          echo "All $AUDIT_LEVEL+ advisories are allowlisted."

      - name: npm audit signatures
        run: npm audit signatures

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && inputs.enable-dependency-review
    steps:
      - uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/dependency-review-action@67d4f4bd7a9b17a0db54d2a7519187c65e339de8 # v4.5.0
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0
