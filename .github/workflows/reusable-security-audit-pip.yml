name: Reusable - Security Audit (pip/poetry)

# Blocking dependency-vulnerability gate for Python/Poetry projects.
# Combines:
#   - pip-audit --strict (fails on ANY advisory)
#   - GitHub dependency-review-action (PR-only, OPT-IN via input -
#     requires GitHub Advanced Security on private repos)
#   - step-security/harden-runner (network egress audit)

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version"
        required: false
        type: string
        default: "3.12"
      pip-audit-version:
        description: "pip-audit version (pinned)"
        required: false
        type: string
        default: "2.7.3"
      enable-dependency-review:
        description: "Enable GitHub dependency-review-action (requires GHAS on private repos)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: read

jobs:
  pip-audit:
    name: pip-audit (gate)
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ inputs.python-version }}

      - uses: snok/install-poetry@76e04a911780d5b312d89783f7b1cd627778900a # v1.4.1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install poetry-plugin-export
        # `poetry export` was extracted into a plugin in Poetry 2.x.
        run: poetry self add poetry-plugin-export

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Install pip-audit (pinned)
        env:
          PIP_AUDIT_VERSION: ${{ inputs.pip-audit-version }}
        run: pip install "pip-audit==${PIP_AUDIT_VERSION}"

      - name: Run pip-audit (strict, fail on any finding)
        run: |
          poetry export -f requirements.txt --without-hashes --output requirements.audit.txt
          pip-audit --strict --requirement requirements.audit.txt --desc on

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && inputs.enable-dependency-review
    steps:
      - uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/dependency-review-action@67d4f4bd7a9b17a0db54d2a7519187c65e339de8 # v4.5.0
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0
